<!DOCTYPE html>
<html>
    <head>
        <title>Central Gamer</title>
    </head>
    <body>
        
        <h1> Central Gamer - Cadastro de Players</h1>

        <hr>

        <h2> Jogos Favoritos</h2>
        <ul>
            <li>Free Fire
            <li>FIFA 26</li>
            <li>Fortnite</li>
        </ul>

        <hr>

        <h2> Cadastro de Jogador</h2>

        <form>

            <fieldset>
                <legend>Informações do Player</legend>

                <label>Nome:</label><br>
                <input type="text"name="nome"><br><br>

                <label>Email:</label><br>
                <input type="email"name="email"><br><br>

                <label>Senha</label><br>
                <input type="password"name="senha"><br><br>

            </fieldset>

            <br>

            <fieldset>
                <legend>Preferências</legend>

                <label>Plataforma:</label><br>
                <input type="radio"
                name="plataforma"> PC<br>
                <input type="radio"
                name="plataforma"> Console<br>
                <input type="radio"
                name="plataforma"> Mobile<br><br>

                <label>Estilo de Jogo:</label><br>
                <input type="checkbox"> Competitivo<br>
                <input type="checkbox"> Casual<br>
                <input type="checkbox"> Cooperativo<br>

            </fieldset>
            <br>
            <button type="submit">Cadastrar Player
        </button>

        </form>
    </body>
</html>
